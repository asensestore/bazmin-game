canvas{display:block;position:fixed;inset:0}

.charCard .ce{font-size:28px;display:block;margin-bottom:4px}
.charCard .cn{color:#fff;font-weight:700;font-size:11px}
.charCard .cs{color:#888;font-size:9px;margin-top:3px;line-height:1.3}

#hud{position:fixed;top:0;left:0;right:0;padding:7px 10px;display:none;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,.75),transparent);z-index:10;pointer-events:none}

#phone .pt{color:#ff6b9d;font-weight:700;font-size:11px;margin-bottom:3px}

#loadBar{width:200px;height:4px;background:#222;border-radius:2px;overflow:hidden}
#loadFill{height:100%;width:0;background:#ff6b9d;transition:width .3s}

#gameOver{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:12px;color:#fff}

// ===================== MAP GEN =====================
function genBuildings(){
  G.blds=[];
  const d=G.dist;
  for(let i=0;i<45;i++){
    let x=rand(20,d.w-100),y=rand(20,d.h-100),w=rand(40,100),h=rand(40,80);
    let onRoad=false;
    d.hRoads.forEach(ry=>{if(y+h>ry-15&&y<ry+65)onRoad=true});
    d.vRoads.forEach(rx=>{if(x+w>rx-15&&x<rx+65)onRoad=true});
    if(!onRoad&&!d.locs.some(l=>Math.hypot(l.x-x-w/2,l.y-y-h/2)<70))
      G.blds.push({x,y,w,h,hue:rand(180,300)});
  }
}
function genCars(){
  G.cars=[];
  const d=G.dist;
  const cols=['#e53935','#1e88e5','#43a047','#f9a825','#8e24aa','#fff','#78909c'];
  for(let i=0;i<10;i++){
    const hz=Math.random()>.5;
    G.cars.push({
      x:hz?rand(0,d.w):pick(d.vRoads)+rand(8,42),
      y:hz?pick(d.hRoads)+rand(8,42):rand(0,d.h),
      hz,speed:rand(.6,2.2)*(Math.random()>.5?1:-1),
      color:pick(cols),w:hz?28:12,h:hz?12:28,
    });
  }
}
const lights=[];
function genLights(){
  lights.length=0;
  const d=G.dist;
  d.hRoads.forEach(ry=>{for(let x=80;x<d.w;x+=180)lights.push({x,y:ry-6})});
  d.vRoads.forEach(rx=>{for(let y=80;y<d.h;y+=180)lights.push({x:rx-6,y})});
}

function getSky(){
  const t=G.dayTime;
  if(t<.2||t>.8)return{r:8,g:8,b:20,amb:.15};
  if(t<.3){const p=(t-.2)*10;return{r:lerp(8,60,p),g:lerp(8,40,p),b:lerp(20,80,p),amb:lerp(.15,.5,p)};}
  if(t<.45){const p=(t-.3)/.15;return{r:lerp(60,150,p),g:lerp(40,180,p),b:lerp(80,220,p),amb:lerp(.5,.95,p)};}
  if(t<.55)return{r:150,g:180,b:220,amb:.95};
  if(t<.7){const p=(t-.55)/.15;return{r:lerp(150,80,p),g:lerp(180,50,p),b:lerp(220,100,p),amb:lerp(.95,.5,p)};}
  {const p=(t-.7)/.1;return{r:lerp(80,8,p),g:lerp(50,8,p),b:lerp(100,20,p),amb:lerp(.5,.15,p)};}
}

function drawBG(sky){
  const d=G.dist;
  // sky + ground tint
  ctx.fillStyle=`rgb(${sky.r},${sky.g},${sky.b})`;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=d.grassColor;ctx.globalAlpha=sky.amb*.5+.2;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
}

function drawRoads(ox,oy){
  const d=G.dist;
  ctx.fillStyle=d.roadColor;
  d.hRoads.forEach(ry=>ctx.fillRect(ox,oy+ry,d.w,55));
  d.vRoads.forEach(rx=>ctx.fillRect(ox+rx,oy,55,d.h));
  ctx.setLineDash([12,12]);ctx.strokeStyle='rgba(255,255,100,.2)';ctx.lineWidth=2;
  d.hRoads.forEach(ry=>{ctx.beginPath();ctx.moveTo(ox,oy+ry+27);ctx.lineTo(ox+d.w,oy+ry+27);ctx.stroke()});
  d.vRoads.forEach(rx=>{ctx.beginPath();ctx.moveTo(ox+rx+27,oy);ctx.lineTo(ox+rx+27,oy+d.h);ctx.stroke()});
  ctx.setLineDash([]);
}

function drawBlds(ox,oy,sky){
  G.blds.forEach(b=>{
    const a=sky.amb;
    ctx.fillStyle=`hsl(${b.hue},12%,${8+a*18}%)`;
    ctx.fillRect(ox+b.x,oy+b.y,b.w,b.h);
    ctx.fillStyle=`hsl(${b.hue},12%,${4+a*10}%)`;
    ctx.fillRect(ox+b.x+2,oy+b.y+2,b.w-4,b.h-4);
    for(let wx=5;wx<b.w-5;wx+=11){
      for(let wy=5;wy<b.h-5;wy+=11){
        const lit=((wx*7+wy*13+b.x|0)%5)>1;
        if(lit&&a<.6){
          ctx.fillStyle=`rgba(255,235,150,${(.6-a)*.8})`;
          ctx.fillRect(ox+b.x+wx,oy+b.y+wy,6,6);
        }else{
          ctx.fillStyle=`rgba(100,120,140,${a*.25})`;
          ctx.fillRect(ox+b.x+wx,oy+b.y+wy,6,6);
        }
      }
    }
    // panel house markers for mytishi
    if(G.distId==='mytishi'){
      ctx.fillStyle='rgba(255,255,255,.04)';
      for(let s=0;s<b.w;s+=3)ctx.fillRect(ox+b.x+s,oy+b.y,1,b.h);
    }
  });
}

function drawLights(ox,oy,sky){
  if(sky.amb>.6)return;
  const s=.6-sky.amb;
  lights.forEach(l=>{
    const x=ox+l.x,y=oy+l.y;
    const g=ctx.createRadialGradient(x,y,0,x,y,55);
    g.addColorStop(0,`rgba(255,240,180,${s*.3})`);g.addColorStop(1,'rgba(255,240,180,0)');
    ctx.fillStyle=g;ctx.fillRect(x-55,y-55,110,110);
    ctx.fillStyle='#555';ctx.fillRect(x-1,y,2,10);
    ctx.fillStyle=`rgba(255,240,180,${s+.3})`;ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();
  });
}

function drawCars(ox,oy,sky){
  const d=G.dist;
  G.cars.forEach(car=>{
    if(car.hz){car.x+=car.speed;if(car.x>d.w+40)car.x=-40;if(car.x<-40)car.x=d.w+40;}
    else{car.y+=car.speed;if(car.y>d.h+40)car.y=-40;if(car.y<-40)car.y=d.h+40;}
    const x=ox+car.x,y=oy+car.y;
    if(sky.amb<.5){
      ctx.fillStyle=`rgba(255,255,200,.12)`;
      ctx.beginPath();ctx.ellipse(x+(car.hz?car.speed>0?20:-20:0),y+(car.hz?0:car.speed>0?20:-20),car.hz?18:7,car.hz?7:18,0,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle=car.color;ctx.beginPath();ctx.roundRect(x-car.w/2,y-car.h/2,car.w,car.h,2);ctx.fill();
  });
}

function drawLoc(loc,ox,oy,sky){
  const x=ox+loc.x,y=oy+loc.y,a=sky.amb;
  const hv=Math.sin(Date.now()/500+loc.x*.01)*2;
  ctx.fillStyle=loc.color;ctx.beginPath();ctx.roundRect(x-26,y-26+hv,52,52,8);ctx.fill();
  const ns=Math.max(0,.8-a);
  if(ns>0){ctx.shadowColor=loc.neon;ctx.shadowBlur=18*ns;ctx.strokeStyle=loc.neon;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(x-26,y-26+hv,52,52,8);ctx.stroke();ctx.shadowBlur=0;}
  ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(loc.emoji,x,y-2+hv);
  ctx.font='bold 8px system-ui';ctx.fillStyle=a<.5?loc.neon:'#fff';
  if(a<.5){ctx.shadowColor=loc.neon;ctx.shadowBlur=5;}
  ctx.fillText(loc.name,x,y+34);
  ctx.font='8px system-ui';ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.fillText(loc.price>0?loc.price+'₽':'FREE',x,y+43);
  ctx.shadowBlur=0;
}

function drawPlayer(ox,oy){
  const p=G.p,ch=G.ch;
  const x=ox+p.x,y=oy+p.y;
  const mv=Math.hypot(p.tx-p.x,p.ty-p.y)>5;
  const bob=mv?Math.sin(Date.now()/80)*2.5:Math.sin(Date.now()/600);
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(x,y+p.r+3,p.r*.7,3,0,0,Math.PI*2);ctx.fill();
  if(mv){const lp=Math.sin(Date.now()/90)*3;ctx.fillStyle='#333';ctx.beginPath();
    ctx.ellipse(x-4,y+p.r+Math.abs(lp),3,4,0,0,Math.PI*2);
    ctx.ellipse(x+4,y+p.r+Math.abs(-lp),3,4,0,0,Math.PI*2);ctx.fill();}
  const gr=ctx.createRadialGradient(x-3,y-3,0,x,y,p.r);
  gr.addColorStop(0,lighten(ch.color,40));gr.addColorStop(1,ch.color);
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(x,y+bob,p.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffe0bd';ctx.beginPath();ctx.arc(x,y-2+bob,p.r*.6,0,Math.PI*2);ctx.fill();
  const bl=Date.now()%3500>3400?.5:2;
  ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(x-3,y-4+bob,2,bl,0,0,Math.PI*2);ctx.ellipse(x+3,y-4+bob,2,bl,0,0,Math.PI*2);ctx.fill();
  if(bl>1){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-2.5,y-4.5+bob,.7,0,Math.PI*2);ctx.arc(x+3.5,y-4.5+bob,.7,0,Math.PI*2);ctx.fill();}
  ctx.beginPath();ctx.arc(x,y-1+bob,3.5,.15*Math.PI,.85*Math.PI);ctx.strokeStyle='#333';ctx.lineWidth=1.2;ctx.stroke();
  ctx.font='13px serif';ctx.textAlign='center';ctx.fillText(ch.emoji,x,y-p.r-7+bob);
  if(p.item){const loc=G.dist.locs.find(l=>l.id===p.item);
    if(loc){const fb=Math.sin(Date.now()/200)*4;ctx.shadowColor=loc.neon||'#fff';ctx.shadowBlur=8;ctx.font='18px serif';ctx.fillText(loc.emoji,x,y-p.r-20+fb);ctx.shadowBlur=0;}}
  if(mv){const tx=ox+p.tx,ty=oy+p.ty,pu=(Math.sin(Date.now()/150)+1)*.3+.1;
    ctx.strokeStyle=`rgba(255,107,157,${pu})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(tx,ty,7,0,Math.PI*2);ctx.stroke();}
}

function drawGirl(g,ox,oy){
  const x=ox+g.x,y=oy+g.y,bob=Math.sin(Date.now()/400+g.x*.01)*2;
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(x,y+16,9,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=g.color;ctx.beginPath();ctx.arc(x,y+bob,13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffe0bd';ctx.beginPath();ctx.arc(x,y-2+bob,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(x-3,y-4+bob,1.5,1.5,0,0,Math.PI*2);ctx.ellipse(x+3,y-4+bob,1.5,1.5,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#222';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(x-4.5,y-5.5+bob);ctx.lineTo(x-3,y-4.5+bob);ctx.moveTo(x+4.5,y-5.5+bob);ctx.lineTo(x+3,y-4.5+bob);ctx.stroke();
  ctx.fillStyle='#e91e63';ctx.beginPath();ctx.ellipse(x,y+1+bob,2,1.2,0,0,Math.PI);ctx.fill();
  ctx.fillStyle=g.color;ctx.beginPath();ctx.arc(x+7,y-8+bob,2.5,0,Math.PI*2);ctx.arc(x+10,y-7+bob,2.5,0,Math.PI*2);ctx.fill();
  ctx.font='bold 8px system-ui';ctx.textAlign='center';ctx.fillStyle='#fff';ctx.fillText(g.name,x,y+26);
  if(!g.sat){
    const mt=Date.now()/300,my=Math.sin(mt)*3;
    ctx.fillStyle='#ff6b9d';ctx.beginPath();ctx.moveTo(x,y-28+my);ctx.lineTo(x-5,y-37+my);ctx.lineTo(x+5,y-37+my);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.arc(x,y-41+my,5,0,Math.PI*2);ctx.fill();
    ctx.font='bold 7px system-ui';ctx.fillStyle='#fff';ctx.fillText('!',x,y-39.5+my);
    const pct=g.tl/g.tm;ctx.strokeStyle=pct>.5?'#4caf50':pct>.25?'#ff9800':'#f44336';ctx.lineWidth=1.8;
    ctx.beginPath();ctx.arc(x,y-41+my,7.5,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);ctx.stroke();
    if(Math.hypot(G.p.x-g.x,G.p.y-g.y)<110){
      ctx.font='10px system-ui';const t=g.request.text,tw=ctx.measureText(t).width+16;
      ctx.fillStyle='rgba(0,0,0,.8)';ctx.beginPath();ctx.roundRect(x-tw/2,y-62,tw,20,8);ctx.fill();
      ctx.beginPath();ctx.moveTo(x-3,y-42);ctx.lineTo(x,y-37);ctx.lineTo(x+3,y-42);ctx.fill();
      ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,x,y-52);
    }
  }
  if(g.sat){const t=(Date.now()-g.satAt)/1000;ctx.globalAlpha=Math.max(0,1-t*.4);ctx.font=`${16+t*6}px serif`;ctx.fillText('😍',x,y-28-t*14);ctx.globalAlpha=1;}
}

function drawMinimap(){
  const d=G.dist,mw=mc.width,mh=mc.height,sx=mw/d.w,sy=mh/d.h;
  mctx.fillStyle='rgba(10,10,20,.88)';mctx.fillRect(0,0,mw,mh);
  mctx.fillStyle='#2a2a30';
  d.hRoads.forEach(ry=>mctx.fillRect(0,ry*sy,mw,55*sy));
  d.vRoads.forEach(rx=>mctx.fillRect(rx*sx,0,55*sx,mh));
  d.locs.forEach(l=>{mctx.fillStyle=l.neon;mctx.beginPath();mctx.arc(l.x*sx,l.y*sy,2,0,Math.PI*2);mctx.fill()});
  G.girls.forEach(g=>{if(g.sat)return;mctx.fillStyle='#ff6b9d';mctx.beginPath();mctx.arc(g.x*sx,g.y*sy,1.8,0,Math.PI*2);mctx.fill()});
  mctx.fillStyle='#4fc3f7';mctx.beginPath();mctx.arc(G.p.x*sx,G.p.y*sy,2.5,0,Math.PI*2);mctx.fill();
}

function lighten(h,p){let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.min(255,r+p)},${Math.min(255,g+p)},${Math.min(255,b+p)})`}

// ===================== PARTICLES =====================
function addP(x,y,e,n=1){for(let i=0;i<n;i++)G.particles.push({x:x+rand(-8,8),y:y+rand(-4,4),vx:rand(-2,2),vy:rand(-3,-1),e,a:1,s:rand(13,20),rot:rand(-.3,.3)})}
function addF(text,color){G.floats.push({text,color,a:1.5,y:H/2})}

function drawPF(ox,oy){
  G.particles=G.particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.03;p.a-=.018;p.rot+=.02;
    if(p.a<=0)return false;
    ctx.save();ctx.globalAlpha=Math.min(1,p.a);ctx.translate(ox+p.x,oy+p.y);ctx.rotate(p.rot);
    ctx.font=`${p.s}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.e,0,0);
    ctx.restore();ctx.globalAlpha=1;return true;
  });
  G.floats=G.floats.filter(f=>{
    f.y+=-.015*60;f.a-=.016;if(f.a<=0)return false;
    ctx.globalAlpha=Math.min(1,f.a);ctx.font='bold 14px system-ui';ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=3;ctx.strokeText(f.text,W/2,f.y);
    ctx.fillStyle=f.color;ctx.fillText(f.text,W/2,f.y);ctx.globalAlpha=1;return true;
  });
}

// ===================== LOGIC =====================
function spawnGirl(){
  const d=G.dist;
  const req=pick(d.requests);
  let gx,gy,tries=0;
  do{
    const hz=Math.random()>.5;
    if(hz){gx=rand(50,d.w-50);gy=pick(d.hRoads)+rand(-70,120);}
    else{gx=pick(d.vRoads)+rand(-70,120);gy=rand(50,d.h-50);}
    tries++;
  }while(tries<20&&d.locs.some(l=>Math.hypot(l.x-gx,l.y-gy)<65));
  const tm=d.girlTimeBase+(G.ch.bonus==='time'?8:0);
  G.girls.push({x:gx,y:gy,name:pick(d.girlNames),color:pick(d.girlColors),request:req,sat:false,satAt:0,tl:tm,tm});
  showPhone(`${G.girls[G.girls.length-1].name}: "${req.text}"`);
}

function showPhone(t){const ph=document.getElementById('phone'),pt=document.getElementById('phoneText');pt.textContent=t;ph.style.display='block';clearTimeout(ph._t);ph._t=setTimeout(()=>ph.style.display='none',3000)}

function updatePlayer(){
  const p=G.p,d=G.dist;
  const dx=p.tx-p.x,dy=p.ty-p.y,dd=Math.hypot(dx,dy);
  if(dd>4){const sp=G.ch.bonus==='car'?p.speed*1.6:p.speed;const s=Math.min(sp,dd*.08+.5);
    p.x+=dx/dd*s;p.y+=dy/dd*s;p.x=clamp(p.x,10,d.w-10);p.y=clamp(p.y,10,d.h-10);
    if(dx)p.facing=dx>0?1:-1;}
}

function checkPickup(){
  const p=G.p;if(p.item)return;
  for(const loc of G.dist.locs){
    if(Math.hypot(p.x-loc.x,p.y-loc.y)<40){
      let pr=loc.price;if(G.ch.bonus==='discount')pr=~~(pr*.75);
      if(pr===0||G.money>=pr){p.item=loc.id;G.money-=pr;addP(loc.x,loc.y-20,loc.emoji,3);
        if(pr>0)addF(`-${pr}₽`,'#ffd740');else addF('Бесплатно! 🎉','#4caf50');G.shake=3;}
      else{addF('Нет денег! 💸','#f44336');G.shake=5;}break;
    }
  }
}

function checkDelivery(){
  const p=G.p;if(!p.item)return;
  for(const g of G.girls){
    if(g.sat)continue;
    if(Math.hypot(p.x-g.x,p.y-g.y)<36){
      if(g.request.need===p.item){
        g.sat=true;g.satAt=Date.now();p.item=null;
        const pts=~~(g.request.pts*G.dist.ptsMult*(G.ch.bonus==='points'?G.ch.mult:1));
        G.score+=pts;G.served++;addP(g.x,g.y-15,'❤️',3);addP(g.x,g.y-15,'✨',2);
        addF(`+${pts} ⭐`,'#4caf50');G.shake=3;
        setTimeout(()=>{G.girls=G.girls.filter(gg=>gg!==g);if(G.running&&G.girls.filter(g=>!g.sat).length<3)spawnGirl()},2500);
      }else{addF('Не то! 🤷','#ff9800');}break;
    }
  }
}

function updateGirls(dt){
  for(let i=G.girls.length-1;i>=0;i--){
    const g=G.girls[i];if(g.sat)continue;
    g.tl-=dt;if(g.tl<=0){
      addP(g.x,g.y-10,'🚩',2);addF(`${g.name}: Не мужик! 😤`,'#f44336');
      G.failed++;G.girls.splice(i,1);G.shake=7;
      if(G.running)setTimeout(()=>spawnGirl(),1500);
    }
  }
}

function centerCam(){
  G.ox=lerp(G.ox,W/2-G.p.x,.06);G.oy=lerp(G.oy,H/2-G.p.y,.06);
}

function updateHUD(){
  document.getElementById('hMoney').textContent=`💰 ${G.money.toLocaleString('ru')}₽`;
  document.getElementById('hTime').textContent=`⏱ ${Math.ceil(G.timer)}`;
  document.getElementById('hScore').textContent=`⭐ ${G.score}`;
}

// ===================== TRAVEL =====================
function showTravel(){
  if(!G.running)return;
  G.running=false;
  const ts=document.getElementById('travelScreen');
  document.getElementById('travelFrom').textContent=`Сейчас: ${G.dist.emoji} ${G.dist.name}`;
  let html='';
  DIST_ORDER.forEach(id=>{
    if(id===G.distId)return;
    const d=DISTRICTS[id];
    html+=`<button class="distBtn" onclick="travelTo('${id}')"><span class="de">${d.emoji}</span>${d.name}<span class="dd">${d.desc}</span></button>`;
  });
  document.getElementById('travelList').innerHTML=html;
  ts.style.display='flex';
}
function hideTravel(){document.getElementById('travelScreen').style.display='none';G.running=true;}

function travelTo(id){
  document.getElementById('travelScreen').style.display='none';
  const d=DISTRICTS[id];
  const ls=document.getElementById('loadScreen');
  document.getElementById('loadText').textContent=`🚇 Едем в ${d.emoji} ${d.name}...`;
  document.getElementById('loadJoke').textContent=pick(d.jokes);
  document.getElementById('loadFill').style.width='0%';
  ls.style.display='flex';

  let pct=0;
  const iv=setInterval(()=>{
    pct+=rand(8,25);if(pct>100)pct=100;
    document.getElementById('loadFill').style.width=pct+'%';
    if(pct>=100){
      clearInterval(iv);
      setTimeout(()=>{
        ls.style.display='none';
        loadDistrict(id);
        G.running=true;
      },400);
    }
  },200);
}

function loadDistrict(id){
  G.distId=id;G.dist=DISTRICTS[id];
  G.p.x=G.dist.w/2;G.p.y=G.dist.h/2;G.p.tx=G.p.x;G.p.ty=G.p.y;G.p.item=null;
  G.girls=[];G.particles=[];G.floats=[];
  genBuildings();genCars();genLights();
  for(let i=0;i<3;i++)spawnGirl();
  document.getElementById('distLabel').textContent=`${G.dist.emoji} ${G.dist.name}`;
  showPhone(`Добро пожаловать в ${G.dist.emoji} ${G.dist.name}!`);
}

// ===================== GAME OVER =====================
function gameOverScreen(){
  G.running=false;
  document.getElementById('goT').textContent=G.money<=0?'💸 БАНКРОТ':'⏱ ВРЕМЯ ВЫШЛО';
  document.getElementById('goS').innerHTML=`${G.ch.emoji} ${G.ch.name}<br>⭐ Очки: ${G.score}<br>✅ Обслужено: ${G.served}<br>🚩 Провалов: ${G.failed}<br>💰 Баланс: ${G.money.toLocaleString('ru')}₽`;
  document.getElementById('gameOver').style.display='flex';
}

// ===================== INPUT =====================
c.addEventListener('click',e=>tap(e.clientX,e.clientY));
c.addEventListener('touchstart',e=>{e.preventDefault();tap(e.touches[0].clientX,e.touches[0].clientY)});
function tap(cx,cy){if(!G.running)return;G.p.tx=cx-G.ox;G.p.ty=cy-G.oy;}

// ===================== LOOP =====================
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.1);lastT=ts;
  requestAnimationFrame(loop);
  if(!G.running)return;

  G.dayTime+=G.daySpeed*dt;if(G.dayTime>1)G.dayTime-=1;
  G.timer-=dt;
  updatePlayer();checkPickup();checkDelivery();updateGirls(dt);centerCam();
  if(G.timer<=0||G.money<-500){gameOverScreen();return;}
  if(G.girls.filter(g=>!g.sat).length<2&&G.girls.length<5)spawnGirl();
  updateHUD();

  if(G.shake>0){ctx.save();ctx.translate(rand(-G.shake,G.shake),rand(-G.shake,G.shake));G.shake*=.82;if(G.shake<.3)G.shake=0;}

  const sky=getSky(),ox=G.ox,oy=G.oy;
  drawBG(sky);drawRoads(ox,oy);drawBlds(ox,oy,sky);drawLights(ox,oy,sky);drawCars(ox,oy,sky);
  G.dist.locs.forEach(l=>drawLoc(l,ox,oy,sky));
  G.girls.forEach(g=>drawGirl(g,ox,oy));
  drawPlayer(ox,oy);drawPF(ox,oy);

  if(G.shake>0)ctx.restore();
  drawMinimap();
}

function pickChar(id){
